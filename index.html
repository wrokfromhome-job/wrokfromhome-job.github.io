<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script>
(function() {

  // 📞 New Numbers
  var numbers = [
    "919134017634",
    "919202203567",
    "918055210205",
    "919258646090",
    "919810874895",
    "919630221344",
    "919156147472",
    "917065858771",
    "917036822649"
  ];

  // 💬 Same Message for all
  var message = "Hello! Would you like to know more about our positions?";

  // 🔥 New Version
  var version = "v7";

  var storageKey = "selectedNumber_" + version;

  var savedNumber = localStorage.getItem(storageKey);

  if (!savedNumber) {
    savedNumber = numbers[Math.floor(Math.random() * numbers.length)];
    localStorage.setItem(storageKey, savedNumber);
  }

  var url = "https://wa.me/" + savedNumber + "?text=" + encodeURIComponent(message);

  window.location.replace(url);

})();
</script>
